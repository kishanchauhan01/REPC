services:

  backend:
    build: .
    container_name: backend-app
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgres://postgres:admin123@postgres:5432/RPES
      REDIS_URL: redis://redis:6379
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules

  postgres:
    image: postgres:18
    container_name: postgres-db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: RPES

    ports:
      - "5433:5432"

    volumes:
      - postgres-data:/var/lib/postgresql

  redis:
    image: redis
    container_name: redis-server
    ports:
      - "6379:6379"

  redisinsight:
    image: redis/redisinsight
    container_name: redisinsight
    ports:
      - "5540:5540"

volumes:
  postgres-data: